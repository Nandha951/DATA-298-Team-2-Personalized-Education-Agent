services:
  # ── Backend API (Node.js + Express + SQLite) ───────────────────────────────
  - type: web
    name: piab-backend
    runtime: docker
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    disk:
      name: piab-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        value: file:/data/prisma/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_GEMINI_API_KEY
        sync: false          # paste your Gemini key in the Render dashboard
      - key: VITE_OPENAI_API_KEY
        sync: false
      - key: VITE_DEEPSEEK_API_KEY
        sync: false
      - key: VITE_OPENAI_MODEL
        value: gpt-4o-mini
      - key: VITE_DEEPSEEK_MODEL
        value: deepseek-chat
      # Existing Modal deployment (batch endpoint — works immediately)
      - key: FINETUNED_ASK_URL
        value: https://basanth-periyapatnaroopakumar--piab-inference-inferences-5f6054.modal.run
      # Stream endpoint — update this after running: modal deploy modal_server.py
      # New URL will be: https://basanth-periyapatnaroopakumar--piab-inference-inferenceserver-ask-stream.modal.run
      # Until then, backend auto-detects JSON response and writes full answer at once (graceful fallback)
      - key: FINETUNED_STREAM_URL
        value: https://basanth-periyapatnaroopakumar--piab-inference-inferences-5f6054.modal.run
      - key: FINETUNED_TIMEOUT_MS
        value: 120000
      - key: LLAMA_CLOUD_API_KEY
        sync: false

  # ── Frontend (React + Vite static site) ───────────────────────────────────
  - type: web
    name: piab-frontend
    runtime: static
    buildCommand: cd Frontend && npm ci && npm run build
    staticPublishPath: Frontend/dist
    envVars:
      - key: VITE_GEMINI_API_KEY
        sync: false          # same Gemini key as above
      # Set this to the piab-backend URL after the backend deploys:
      # e.g. https://piab-backend.onrender.com
      - key: VITE_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
